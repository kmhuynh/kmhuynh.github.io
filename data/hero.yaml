name: Khoi Huynh
meta_title: Postdoctoral Researcher
meta_description: "Khoi Huynh is a postdoctoral researcher of the Department of Radiology, UNC Chapel Hill, studying brain development using advanced MRI techniques."
title: Postdoctoral Researcher in Radiology · UNC Chapel Hill
photo: img/headshot.jpg
bio:
  - >
    I am a postdoc in radiology at UNC Chapel Hill. Since 2017, I've been working with
    [Dr. Pew-Thian Yap](https://www.med.unc.edu/radiology/people/pew-thian-yap/) on MR reconstruction, signal representation, noise removal,
    tractography, and microstructure imaging using diffusion MRI data with applications
    in neurodevelopment.
  - >
    I'm especially focused on creating normative brain charts (like the height and weight
    charts used in pediatric care) to help spot when something's not quite right. At the
    heart of it, I'm driven by a simple goal: to turn brain scans into practical tools
    that make healthcare better.
