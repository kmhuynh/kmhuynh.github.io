intro: "Open-source contributions to advance neuroimaging research."
contact_email: kmhuynh@med.unc.edu

tools:
  - name: Optimal Shrinkage Denoising
    status: active
    description: >
      Breakthrough noise reduction for high-resolution diffusion MRI. 11x noise floor
      reduction, multi-channel complex-valued data processing, optimal shrinkage of
      singular values.
    language: MATLAB
    links:
      - text: OSF Repository
        url: https://osf.io/f384h/
      - text: Paper
        url: https://www.cell.com/patterns/fulltext/S2666-3899(24)00053-9
    citation: >
      Huynh, K. M., Chang, W. T., Wu, Y., & Yap, P. T. (2024). Optimal shrinkage denoising
      breaks the noise floor in high-resolution diffusion MRI. Patterns, 5(3), 100954.

  - name: Diffusion MRI Processing Pipeline
    status: coming
    description: >
      Comprehensive toolkit for diffusion MRI analysis. Microstructure modeling,
      tractography, and developmental analysis. Works with existing neuroimaging software.

  - name: Brain Development Atlases
    status: dev
    description: >
      Normative brain charts for pediatric applications. Height/weight chart equivalent
      for brain development. Applications in early detection of developmental issues.

datasets:
  - name: 24-Shell Diffusion MRI Data
    description: >
      Healthy adult 24-shell diffusion MRI dataset. Preprocessed with dcm2niix,
      eddy and topup via dwifslpreproc. See data.json for acquisition parameters.
      Available under MIT License.
    links:
      - text: Zenodo
        url: https://zenodo.org/records/5009884
      - text: Paper
        url: https://doi.org/10.1109/TMI.2020.3001175
    citation: >
      Huynh, K. M., Xu, T., Wu, Y., Wang, X., Chen, G., Wu, H., Thung, K.-H.,
      Lin, W., Shen, D., & Yap, P.-T. (2020). Probing tissue microarchitecture of the
      baby brain via spherical mean spectrum imaging. IEEE Transactions on Medical Imaging,
      39(11), 3607-3618.
